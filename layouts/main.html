<!DOCTYPE {{{ page.doctype || 'html' }}}>

  <if condition="page.title">

        url('EuropaGroteskSH-Bol.woff') format('woff');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Suisse Works';
      src: url('SuisseWorks.woff2') format('woff2'),
        url('SuisseWorks.woff') format('woff');
      font-weight: 700;
      font-style: normal;
    }

@font-face {

      src: url('UBU-Logotype-v1-Regular.woff2') format('woff2'),
        url('UBU-Logotype-v1-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
    }

    p,
    h1,
    h2,
    h3,
    li,
    td {
      color: #000000 !important;
    }
  </style>
  <stack name="head" />
</head>
