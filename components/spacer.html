<script props>
  // https://maizzle.com/docs/components/spacer
  let styles = [
    
  ]

  if (props.height) {
    styles.push(`line-height: ${props.height/2};`)
  }

  if (props.line) {
    styles.push(`border-top:${props.line}px solid #000000;`)
  }

  if (props['mso-height']) {
    styles.push(`mso-line-height-alt: ${props['mso-height']};`)
  }

  module.exports = {
    height: props.height,
    line: props.line,
    styles: styles.join('')
  }
</script>

<if condition="height">
  <div
    role="separator"
    style="{{ props.height/2 }}"
  >&zwj;</div>
  <div
    role="separator"
    style="{{ styles }} {{}}"
  >&zwj;</div>
</if>
<else>
  <div role="separator">&zwj;</div>
</else>
